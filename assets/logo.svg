<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#242836;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ff7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="squeezeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8ff7;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f8ff7;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="10" y="10" width="180" height="180" rx="30" ry="30" fill="url(#bgGrad)" stroke="#2d3348" stroke-width="2"/>

  <!-- 挤压效果 - 左侧宽条 -->
  <rect x="30" y="85" width="50" height="30" rx="6" fill="url(#squeezeGrad)" opacity="0.4"/>

  <!-- 挤压效果 - 中间窄条（被挤压的部分） -->
  <polygon points="85,80 115,80 118,85 118,115 115,120 85,120 82,115 82,85" fill="url(#squeezeGrad)" opacity="0.7"/>

  <!-- 挤压效果 - 右侧宽条 -->
  <rect x="120" y="85" width="50" height="30" rx="6" fill="url(#squeezeGrad)" opacity="0.4"/>

  <!-- 挤压箭头 - 左 -->
  <polygon points="75,95 85,88 85,102" fill="#4f8ff7" opacity="0.6"/>

  <!-- 挤压箭头 - 右 -->
  <polygon points="125,95 115,88 115,102" fill="#4f8ff7" opacity="0.6"/>

  <!-- TS字母标识 -->
  <text x="100" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="url(#textGrad)">TS</text>

  <!-- 底部文字 -->
  <text x="100" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8b90a5" letter-spacing="2">TOKENSQUEEZER</text>

  <!-- 装饰点 -->
  <circle cx="45" cy="45" r="3" fill="#4f8ff7" opacity="0.5"/>
  <circle cx="155" cy="45" r="3" fill="#34d399" opacity="0.5"/>
  <circle cx="45" cy="155" r="3" fill="#34d399" opacity="0.5"/>
  <circle cx="155" cy="155" r="3" fill="#4f8ff7" opacity="0.5"/>
</svg>
